name: proyecto_de_desarrollo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP
  http: ^1.2.0

  # Almacenamiento seguro del token
  flutter_secure_storage: ^9.0.0

  # Manejo de estado
  provider: ^6.1.2

  # Navegacion
  go_router: ^13.0.0

  # Animaciones Lottie
  lottie: ^3.1.0

  # Animaciones
  flutter_animate: ^4.5.0

  # Fuentes
  google_fonts: ^6.2.1

  #env
  flutter_dotenv: ^5.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"  # tu imagen, mínimo 1024x1024px, fondo no transparente
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"

flutter_native_splash:
  color: "#F4F3FF"           # color de fondo — usa tu AppColors.midnight
  image: "assets/icons/appsmash.png"
  android_12:
    image: "assets/icons/appsmash.png"
    color: "#F4F3FF"
  web: true



